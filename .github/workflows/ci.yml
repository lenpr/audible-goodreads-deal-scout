name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python files
        run: python -m py_compile audible_goodreads_deal_scout/*.py tests/test_*.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

  publishability:
    name: Publishability checks
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify expected public files exist
        run: |
          test -f README.md
          test -f SKILL.md
          test -f LICENSE
          test -f CHANGELOG.md
          test -f .clawhubignore
          test -f config.example.json
          test -f agents/openai.yaml

      - name: Verify tracked repo hygiene
        run: |
          ! git ls-files | grep -E '(^|/)(__pycache__/|\.DS_Store$|\.audible-goodreads-deal-scout/)'

      - name: Run publish audit
        run: python -m audible_goodreads_deal_scout.public_cli publish-audit --version 0.1.0 --tags latest
